[workspace]
members = [
    "crates/des-app",
    "crates/des-core",
    "crates/des-graph-egui",
    "crates/des-layout-engine",
    "crates/des-python",
    "crates/des-template",
    "crates/des-ui-document",
    "crates/des-ui-egui",
    "crates/des-ui-lab",
    "crates/des-ui-render",
    "crates/des-ui-text",
    "crates/des-ui-widgets",
]
exclude = ["crates/des-apple-dispatch"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/bj-data-eng/data-engine-studio"

[workspace.dependencies]
des-app = { path = "crates/des-app" }
des-core = { path = "crates/des-core" }
des-graph-egui = { path = "crates/des-graph-egui" }
des-layout-engine = { path = "crates/des-layout-engine" }
des-template = { path = "crates/des-template" }
des-ui-document = { path = "crates/des-ui-document" }
des-ui-egui = { path = "crates/des-ui-egui" }
des-ui-lab = { path = "crates/des-ui-lab" }
des-ui-render = { path = "crates/des-ui-render" }
des-ui-text = { path = "crates/des-ui-text" }
des-ui-widgets = { path = "crates/des-ui-widgets" }
eframe = { version = "=0.34.1", default-features = true }
egui = "=0.34.1"
iconflow = { version = "=1.0.0", default-features = false }
layout-rs = "=0.1.3"
parley = { version = "=0.9.0", default-features = true }
filetime = "=0.2.29"
pyo3 = { version = "=0.27.2", features = ["extension-module", "abi3-py311"] }
serde = { version = "=1.0.228", features = ["derive"] }

[patch.crates-io]
dispatch = { path = "crates/des-apple-dispatch" }
