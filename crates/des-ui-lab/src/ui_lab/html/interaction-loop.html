<h2 id="loop-title" class="section-title">Event to document update loop</h2>
<section id="loop-grid" class="loop-grid">
  <article id="loop-action-card" class="loop-control-card">
    <h3 id="loop-action-title" class="card-title">Button event</h3>
    <button id="loop-action-button" class="loop-button" on:click="loop-action-button">
      <span id="loop-action-button-label" class="control-label">Send update</span>
    </button>
  </article>
  <article id="loop-button-result-box" class="loop-result-card">
    <span id="loop-button-result-title" class="muted">Button target</span>
    <span id="loop-button-result" class="control-label">waiting for button event</span>
  </article>
  <article id="loop-checkbox-result-box" class="loop-result-card">
    <span id="loop-checkbox-result-title" class="muted">Checkbox target</span>
    <span id="loop-checkbox-result" class="control-label">profiling state pending</span>
  </article>
  <article id="loop-radio-result-box" class="loop-result-card">
    <span id="loop-radio-result-title" class="muted">Radio target</span>
    <span id="loop-radio-result" class="control-label">runtime state pending</span>
  </article>
  <article id="loop-dropdown-result-box" class="loop-result-card">
    <span id="loop-dropdown-result-title" class="muted">Dropdown target</span>
    <span id="loop-dropdown-result" class="control-label">source adapter pending</span>
  </article>
  <article id="loop-summary-result-box" class="loop-result-card">
    <span id="loop-summary-result-title" class="muted">Combined target</span>
    <span id="loop-summary-result" class="control-label">waiting for updates</span>
  </article>
</section>
