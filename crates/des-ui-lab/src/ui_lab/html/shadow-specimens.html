<h3 id="shadow-specimen-title" class="section-title">Shadow Styling</h3>
<p id="shadow-specimen-copy" class="muted">
  Single soft shadows are paint-only; spread can contract or expand the source shape.
</p>
<section id="shadow-specimen-grid" class="shadow-grid">
  <article id="shadow-single" class="shadow-card shadow-single">
    <h3 id="shadow-single-label" class="card-title">Elevation level 2</h3>
    <p id="shadow-single-body" class="muted">single soft layer</p>
  </article>
  <article id="shadow-layered" class="shadow-card shadow-layered">
    <h3 id="shadow-layered-label" class="card-title">Elevation level 3</h3>
    <p id="shadow-layered-body" class="muted">menu/card emphasis</p>
  </article>
  <article id="shadow-negative-spread" class="shadow-card shadow-negative-spread">
    <h3 id="shadow-negative-spread-label" class="card-title">Elevation level 5</h3>
    <p id="shadow-negative-spread-body" class="muted">dragged surface</p>
  </article>
</section>
<section id="shadow-light-stage" class="shadow-light-stage">
  <article id="shadow-light-top" class="shadow-light-card shadow-light-card-raised">
    <span id="shadow-light-top-label" class="shadow-light-label">48</span>
    <icon id="shadow-light-top-handle" class="shadow-light-handle" data-glyph="drag-handle"></icon>
  </article>
  <article id="shadow-light-bottom" class="shadow-light-card">
    <span id="shadow-light-bottom-label" class="shadow-light-label">30</span>
    <icon id="shadow-light-bottom-handle" class="shadow-light-handle" data-glyph="drag-handle"></icon>
  </article>
</section>
<section id="shadow-web-stage" class="shadow-web-stage">
  <article id="shadow-web-top" class="shadow-web-card shadow-web-card-raised">
    <span id="shadow-web-top-label" class="shadow-web-label">46</span>
    <icon id="shadow-web-top-handle" class="shadow-web-handle" data-glyph="drag-handle"></icon>
  </article>
  <article id="shadow-web-bottom" class="shadow-web-card">
    <span id="shadow-web-bottom-label" class="shadow-web-label">48</span>
    <icon id="shadow-web-bottom-handle" class="shadow-web-handle" data-glyph="drag-handle"></icon>
  </article>
</section>
